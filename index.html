<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solace v48.7 - Stable Cloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --sol-bg: #000; --sol-sidebar: #0f0f0f; --sol-card: #141414; --sol-red: #ff0000; --sol-white: #fff; }
        body { background: var(--sol-bg); color: var(--sol-white); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Layout */
        .sidebar { width: 260px; height: 100vh; background: var(--sol-sidebar); position: fixed; left: 0; top: 0; border-right: 1px solid #222; transition: 0.3s; z-index: 2000; }
        .sidebar.collapsed { width: 0px; border: none; }
        .main-panel { margin-left: 260px; padding: 25px; transition: 0.3s; min-height: 100vh; }
        .sidebar.collapsed ~ .main-panel { margin-left: 0px; }

        /* UI Elements */
        .sol-card { background: var(--sol-card); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #222; }
        .sol-input { background: #000 !important; border: 1px solid #333 !important; color: white !important; }
        .btn-red { background: var(--sol-red); color: white; border: none; font-weight: bold; border-radius: 6px; }
        .top-control { position: fixed; top: 15px; right: 20px; z-index: 3000; display: flex; align-items: center; gap: 10px; }
        
        /* Navigation */
        .nav-link { color: #fff; padding: 12px 20px; border: none; background: transparent; width: 100%; text-align: left; display: flex; align-items: center; gap: 12px; transition: 0.2s; cursor: pointer; }
        .nav-link:hover { background: #1a1a1a; }
        .nav-link.active { background: #1a1a1a; border-left: 4px solid var(--sol-red); color: var(--sol-red); font-weight: bold; }

        /* Overlays */
        #login-overlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 350px; padding: 40px; background: #0f0f0f; border-radius: 15px; border: 1px solid #333; text-align: center; }
        
        .pointer { cursor: pointer; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); border: 1px solid #333; min-width: 800px; }
        .cal-day { min-height: 100px; border: 1px solid #222; padding: 5px; font-size: 0.7rem; }
        .cal-event { font-size: 0.6rem; background: var(--sol-red); padding: 2px 5px; border-radius: 3px; margin-top: 2px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 class="fw-bold mb-1" style="color:var(--sol-red); letter-spacing: 4px;">SOLACE</h2>
        <p class="text-muted small mb-4">AUTHENTICATE CLOUD ACCESS</p>
        <input type="text" id="u-in" class="form-control sol-input mb-2 text-center" placeholder="USER">
        <input type="password" id="p-in" class="form-control sol-input mb-3 text-center" placeholder="PASS">
        <button class="btn btn-red w-100 py-2" onclick="login()">INITIALIZE</button>
    </div>
</div>

<div class="top-control" id="top-ui" style="display:none">
    <div id="sync-indicator" class="badge bg-success opacity-75" style="display:none">Synced</div>
    <div class="badge bg-danger px-3 py-2" id="user-display"></div>
    <button class="btn btn-dark border-secondary" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
</div>

<div class="sidebar collapsed" id="sidebar" style="display:none">
    <div class="p-4"><h3 class="fw-bold m-0 text-danger">SOLACE</h3></div>
    <div class="nav flex-column">
        <button class="nav-link active" onclick="showTab('tab-pro', this)"><i class="bi bi-stack"></i> Projects</button>
        <button class="nav-link" onclick="showTab('tab-cust', this)"><i class="bi bi-people"></i> Customers</button>
        <button class="nav-link" onclick="showTab('tab-cal', this); renderCalendar()"><i class="bi bi-calendar3"></i> Calendar</button>
        <button class="nav-link" onclick="showTab('tab-inv', this)"><i class="bi bi-box-seam"></i> Inventory</button>
        <button class="nav-link" onclick="showTab('tab-chk', this)"><i class="bi bi-check2-square"></i> Tasks</button>
        <button class="nav-link" onclick="showTab('tab-fin', this)"><i class="bi bi-currency-rupee"></i> Financials</button>
        <button class="nav-link admin-only" onclick="showTab('tab-acc', this)"><i class="bi bi-shield-lock"></i> Admin</button>
        <button class="nav-link text-danger mt-5" onclick="location.reload()"><i class="bi bi-power"></i> Logoff</button>
    </div>
</div>

<div class="main-panel" id="main-panel" style="display:none">
    <h4 class="fw-bold text-uppercase border-bottom border-secondary pb-3 mb-4" id="tab-label">Projects</h4>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-pro">
            <div class="sol-card admin-only"><div class="row g-2">
                <div class="col-md-3"><input type="text" id="p-n" class="form-control sol-input" placeholder="Client"></div>
                <div class="col-md-3"><input type="text" id="p-a" class="form-control sol-input" placeholder="Apt/Society"></div>
                <div class="col-md-2"><input type="date" id="p-s" class="form-control sol-input"></div>
                <div class="col-md-2"><input type="date" id="p-e" class="form-control sol-input"></div>
                <div class="col-md-2"><button class="btn btn-red w-100" onclick="addItem('projects')">Create</button></div>
            </div></div>
            <div class="sol-card p-0 overflow-hidden"><table class="table table-dark m-0"><thead><tr><th>Client</th><th>Location</th><th>Dates</th><th>Action</th></tr></thead><tbody id="list-pro"></tbody></table></div>
        </div>

        <div class="tab-pane fade" id="tab-cust">
            <div class="sol-card admin-only"><div class="row g-2">
                <div class="col-md-5"><input type="text" id="c-n" class="form-control sol-input" placeholder="Customer Name"></div>
                <div class="col-md-5"><input type="text" id="c-s" class="form-control sol-input" placeholder="Society"></div>
                <div class="col-md-2"><button class="btn btn-red w-100" onclick="addItem('customers')">Add</button></div>
            </div></div>
            <div class="sol-card p-0"><table class="table table-dark m-0"><thead><tr><th>Name</th><th>Society</th><th>Action</th></tr></thead><tbody id="list-cust"></tbody></table></div>
        </div>

        <div class="tab-pane fade" id="tab-fin">
            <div class="sol-card admin-only"><div class="row g-2">
                <div class="col-md-7"><input type="text" id="f-d" class="form-control sol-input" placeholder="Expense Desc"></div>
                <div class="col-md-3"><input type="number" id="f-a" class="form-control sol-input" placeholder="Amount"></div>
                <div class="col-md-2"><button class="btn btn-red w-100" onclick="addItem('finance')">Log</button></div>
            </div></div>
            <div class="sol-card p-0">
                <table class="table table-dark m-0"><thead><tr><th>Desc</th><th>Amount</th><th>Action</th></tr></thead><tbody id="list-fin"></tbody></table>
                <div class="p-3 bg-dark d-flex justify-content-between"><span>Total:</span><h4 id="fin-total" class="m-0 fw-bold text-danger">₹0</h4></div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-cal">
            <div class="sol-card p-0 overflow-auto">
                <div class="p-3 d-flex justify-content-between bg-dark align-items-center">
                    <button class="btn btn-sm btn-outline-light" onclick="changeMonth(-1)">Prev</button>
                    <h5 class="m-0 fw-bold text-uppercase" id="cal-month-label"></h5>
                    <button class="btn btn-sm btn-outline-light" onclick="changeMonth(1)">Next</button>
                </div>
                <div class="cal-grid" id="calendar-body"></div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-inv">
            <div class="sol-card admin-only"><div class="row g-2">
                <div class="col-md-7"><input type="text" id="i-n" class="form-control sol-input" placeholder="Item"></div>
                <div class="col-md-3"><input type="number" id="i-q" class="form-control sol-input" placeholder="Qty"></div>
                <div class="col-md-2"><button class="btn btn-red w-100" onclick="addItem('inventory')">Update</button></div>
            </div></div>
            <div class="sol-card p-0"><table class="table table-dark m-0"><thead><tr><th>Item</th><th>Stock</th><th>Action</th></tr></thead><tbody id="list-inv"></tbody></table></div>
        </div>

        <div class="tab-pane fade" id="tab-chk">
            <div class="sol-card admin-only"><div class="row g-2"><div class="col-10"><input type="text" id="tk-n" class="form-control sol-input" placeholder="Task description..."></div><div class="col-2"><button class="btn btn-red w-100" onclick="addItem('tasks')">Post</button></div></div></div>
            <div class="sol-card p-0" id="list-chk"></div>
        </div>

        <div class="tab-pane fade" id="tab-acc">
            <div class="sol-card"><h6 class="text-danger fw-bold mb-3">MANAGE USERS</h6><div class="row g-2">
                <div class="col-md-4"><input type="text" id="nu-u" class="form-control sol-input" placeholder="User"></div>
                <div class="col-md-4"><input type="text" id="nu-p" class="form-control sol-input" placeholder="Pass"></div>
                <div class="col-md-4"><button class="btn btn-red w-100" onclick="addUser()">Create User</button></div>
            </div></div>
            <div class="sol-card p-0 mt-3"><table class="table table-dark m-0"><thead><tr><th>Username</th><th>Action</th></tr></thead><tbody id="list-acc"></tbody></table></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-analytics.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCIJpuucTWRw2U8xNmLp3gkOw-fzgTeh5I",
        authDomain: "solace-2c588.firebaseapp.com",
        databaseURL: "https://solace-2c588-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "solace-2c588",
        storageBucket: "solace-2c588.firebasestorage.app",
        messagingSenderId: "392117139934",
        appId: "1:392117139934:web:9bb796d66af5ae8bbec54f",
        measurementId: "G-D3N8NPRJV1"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db_cloud = getDatabase(app);
    const solaceRef = ref(db_cloud, 'solace_data');

    // App State
    window.db = { projects: [], customers: [], finance: [], tasks: [], inventory: [], users: [{u: 'taksheel', p: 'tvsk2009@', role: 'Managing Partner'}] };
    let sessionUser = null;
    let currDate = new Date();

    // Firebase Core Sync
    onValue(solaceRef, (snap) => {
        const val = snap.val();
        if (val) {
            window.db = val;
            if(!window.db.users) window.db.users = [{u: 'taksheel', p: 'tvsk2009@', role: 'Managing Partner'}];
            render();
            renderCalendar();
            document.getElementById('sync-indicator').style.display = 'block';
            setTimeout(() => document.getElementById('sync-indicator').style.display = 'none', 1000);
        }
    });

    window.saveToCloud = () => set(solaceRef, window.db);

    // Navigation logic (STABLE)
    window.showTab = (tabId, btn) => {
        // Remove all active classes
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('show', 'active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        
        // Add active classes
        document.getElementById(tabId).classList.add('show', 'active');
        btn.classList.add('active');
        
        // Update label
        document.getElementById('tab-label').innerText = btn.innerText.trim();
        
        // Auto-close sidebar on small screens
        if(window.innerWidth < 768) window.toggleSidebar();
    };

    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('collapsed');

    // Auth Logic
    window.login = () => {
        const u = document.getElementById('u-in').value, p = document.getElementById('p-in').value;
        const user = window.db.users.find(x => x.u === u && x.p === p);
        if(user) {
            sessionUser = user;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('sidebar').style.display = 'block';
            document.getElementById('main-panel').style.display = 'block';
            document.getElementById('top-ui').style.display = 'flex';
            document.getElementById('user-display').innerText = user.u;
            render();
        } else alert("Invalid System Access.");
    };

    // Data Operations
    window.addItem = (type) => {
        const id = Date.now();
        if(type==='projects') window.db.projects.push({id, n: document.getElementById('p-n').value, a: document.getElementById('p-a').value, s: document.getElementById('p-s').value, e: document.getElementById('p-e').value});
        if(type==='customers') window.db.customers.push({id, n: document.getElementById('c-n').value, s: document.getElementById('c-s').value});
        if(type==='finance') window.db.finance.push({id, d: document.getElementById('f-d').value, a: parseFloat(document.getElementById('f-a').value)});
        if(type==='inventory') window.db.inventory.push({id, n: document.getElementById('i-n').value, q: document.getElementById('i-q').value});
        if(type==='tasks') window.db.tasks.push({id, t: document.getElementById('tk-n').value});
        window.saveToCloud();
    };

    window.del = (type, id) => { window.db[type] = window.db[type].filter(x => x.id !== id); window.saveToCloud(); };
    window.addUser = () => { window.db.users.push({u: document.getElementById('nu-u').value, p: document.getElementById('nu-p').value}); window.saveToCloud(); };
    window.changeMonth = (v) => { currDate.setMonth(currDate.getMonth()+v); renderCalendar(); };

    // UI Rendering
    function render() {
        document.getElementById('list-pro').innerHTML = (window.db.projects || []).map(x => `<tr><td>${x.n}</td><td>${x.a}</td><td>${x.s} to ${x.e}</td><td><i class="bi bi-trash text-danger pointer" onclick="del('projects',${x.id})"></i></td></tr>`).join('');
        document.getElementById('list-cust').innerHTML = (window.db.customers || []).map(x => `<tr><td>${x.n}</td><td>${x.s}</td><td><i class="bi bi-trash text-danger pointer" onclick="del('customers',${x.id})"></i></td></tr>`).join('');
        document.getElementById('list-inv').innerHTML = (window.db.inventory || []).map(x => `<tr><td>${x.n}</td><td>${x.q}</td><td><i class="bi bi-trash text-danger pointer" onclick="del('inventory',${x.id})"></i></td></tr>`).join('');
        document.getElementById('list-chk').innerHTML = (window.db.tasks || []).map(x => `<div class="p-3 border-bottom border-dark d-flex justify-content-between"><span>${x.t}</span><i class="bi bi-x-circle text-danger pointer" onclick="del('tasks',${x.id})"></i></div>`).join('');
        
        let total = 0;
        document.getElementById('list-fin').innerHTML = (window.db.finance || []).map(x => { total += x.a; return `<tr><td>${x.d}</td><td class="text-danger">₹${x.a}</td><td><i class="bi bi-trash text-danger pointer" onclick="del('finance',${x.id})"></i></td></tr>`}).join('');
        document.getElementById('fin-total').innerText = "₹" + total;

        document.getElementById('list-acc').innerHTML = (window.db.users || []).map(u => `<tr><td>${u.u}</td><td><i class="bi bi-trash text-danger pointer" onclick="window.db.users=window.db.users.filter(z=>z.u!=='${u.u}');window.saveToCloud()"></i></td></tr>`).join('');
    }

    window.renderCalendar = () => {
        const grid = document.getElementById('calendar-body'); if(!grid) return; grid.innerHTML = '';
        const y = currDate.getFullYear(), m = currDate.getMonth();
        document.getElementById('cal-month-label').innerText = new Intl.DateTimeFormat('en-US', {month: 'long', year: 'numeric'}).format(currDate);
        for(let i=1; i<=new Date(y, m+1, 0).getDate(); i++) {
            const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            let h = `<div class="cal-day"><span class="opacity-25">${i}</span>`;
            (window.db.projects || []).filter(p=>p.s<=dStr && p.e>=dStr).forEach(p=>h+=`<div class="cal-event">${p.n}</div>`);
            grid.innerHTML += h + `</div>`;
        }
    };
</script>
</body>
</html>
