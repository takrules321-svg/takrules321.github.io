<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solace v46.8 - Full System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --sol-bg: #000000; --sol-sidebar: #0f0f0f; --sol-card: #141414; --sol-red: #ff0000; --sol-white: #ffffff; }
        body { background-color: var(--sol-bg); color: var(--sol-white); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* SIDEBAR & PANEL LOGIC */
        .sidebar { width: 260px; height: 100vh; background: var(--sol-sidebar); position: fixed; left: 0; top: 0; border-right: 1px solid #222; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; overflow: hidden; }
        .sidebar.collapsed { width: 0px; border: none; }
        .main-panel { margin-left: 260px; padding: 25px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar.collapsed ~ .main-panel { margin-left: 0px; }

        /* TOP RIGHT TOGGLE */
        .top-control { position: fixed; top: 15px; right: 20px; z-index: 3000; display: flex; align-items: center; gap: 15px; }
        .burger-btn { background: var(--sol-card); border: 1px solid #333; color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .burger-btn:hover { border-color: var(--sol-red); color: var(--sol-red); }

        /* RESPONSIVE TABLES */
        .table-responsive { border-radius: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .table { color: var(--sol-white); border-color: #222; vertical-align: middle; min-width: 600px; }
        
        .nav-link { color: var(--sol-white); padding: 12px 25px; border-radius: 0 50px 50px 0; margin-bottom: 4px; border: none; background: transparent; width: 95%; text-align: left; transition: 0.2s; display: flex; align-items: center; gap: 15px; white-space: nowrap; }
        .nav-link.active { background: #1a1a1a; border-left: 5px solid var(--sol-red); font-weight: bold; color: var(--sol-red); }
        
        .sol-card { background: var(--sol-card); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #222; }
        .sol-input { background: #000 !important; border: 1px solid #333 !important; color: white !important; font-size: 0.9rem; }
        .btn-red { background: var(--sol-red); color: white; border: none; font-weight: bold; padding: 10px 20px; border-radius: 6px; text-transform: uppercase; }

        /* CALENDAR */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #333; border-left: 1px solid #333; min-width: 800px; }
        .cal-day { min-height: 110px; border-right: 1px solid #222; border-bottom: 1px solid #222; padding: 8px; font-size: 0.75rem; cursor: pointer; }
        .cal-event { font-size: 0.65rem; padding: 3px 6px; border-radius: 4px; margin-top: 4px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ev-proj { border-left: 2px solid #555; color: #888; }
        .ev-mile { background: var(--sol-red); color: #fff; font-weight: bold; }
        .ev-note { color: #00d4ff; font-style: italic; border: 1px solid #333; }

        #login-overlay { position: fixed; inset: 0; background: var(--sol-bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 360px; padding: 40px; background: var(--sol-sidebar); border-radius: 12px; border: 1px solid #333; text-align: center; }
        
        @media (max-width: 768px) {
            .main-panel { padding: 15px; padding-top: 70px; }
            .sidebar { width: 100%; } /* Full screen menu on mobile when open */
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h1 class="fw-bold mb-4" style="color:var(--sol-red); letter-spacing: 5px;">SOLACE</h1>
        <input type="text" id="u-in" class="form-control sol-input mb-3 text-center" placeholder="USERNAME">
        <input type="password" id="p-in" class="form-control sol-input mb-4 text-center" placeholder="PASSWORD">
        <button class="btn btn-red w-100" onclick="login()">Initialize</button>
    </div>
</div>

<div class="top-control" id="top-ui" style="display:none">
    <div class="badge bg-danger px-3 py-2" id="user-display"></div>
    <button class="burger-btn" onclick="toggleSidebar()"><i class="bi bi-list fs-4"></i></button>
</div>

<div class="sidebar collapsed" id="sidebar" style="display:none">
    <div class="p-4 mb-2"><h2 class="fw-bold m-0" style="color:var(--sol-red); letter-spacing: 2px;">SOLACE</h2></div>
    <div class="nav flex-column mt-3">
        <button class="nav-link active" onclick="showTab('tab-pro', this)"><i class="bi bi-stack"></i> Projects</button>
        <button class="nav-link" onclick="showTab('tab-cust', this)"><i class="bi bi-people"></i> Customers</button>
        <button class="nav-link" onclick="showTab('tab-cal', this); renderCalendar()"><i class="bi bi-calendar3"></i> Calendar</button>
        <button class="nav-link" onclick="showTab('tab-inv', this)"><i class="bi bi-box-seam"></i> Inventory</button>
        <button class="nav-link" onclick="showTab('tab-chk', this)"><i class="bi bi-check2-square"></i> Checklist</button>
        <button class="nav-link" onclick="showTab('tab-fin', this)"><i class="bi bi-currency-rupee"></i> Financials</button>
        <button class="nav-link admin-only" onclick="showTab('tab-acc', this)"><i class="bi bi-shield-lock"></i> Administration</button>
        <div class="mt-auto p-3"><button class="btn btn-outline-danger w-100 btn-sm" onclick="location.reload()">Logoff</button></div>
    </div>
</div>

<div class="main-panel" id="main-panel" style="display:none">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-3">
        <h4 class="fw-bold text-uppercase m-0" id="tab-label">Projects</h4>
    </div>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-pro">
            <div class="sol-card admin-only">
                <div class="row g-2">
                    <div class="col-md-3"><input type="text" id="p-n" class="form-control sol-input" placeholder="Client"></div>
                    <div class="col-md-3"><input type="text" id="p-a" class="form-control sol-input" placeholder="Apt"></div>
                    <div class="col-md-2"><input type="date" id="p-s" class="form-control sol-input"></div>
                    <div class="col-md-2"><input type="date" id="p-e" class="form-control sol-input"></div>
                    <div class="col-md-2"><button class="btn btn-red w-100" onclick="addItem('projects')">Create</button></div>
                </div>
            </div>
            <div class="table-responsive sol-card p-0"><table class="table m-0"><thead><tr><th>Client</th><th>Apt</th><th>Status</th><th>Action</th></tr></thead><tbody id="list-pro"></tbody></table></div>
        </div>

        <div class="tab-pane fade" id="tab-cust">
            <div class="sol-card admin-only">
                <div class="row g-2">
                    <div class="col-md-4"><input type="text" id="c-n" class="form-control sol-input" placeholder="Name"></div>
                    <div class="col-md-4"><input type="text" id="c-s" class="form-control sol-input" placeholder="Society"></div>
                    <div class="col-md-2"><input type="date" id="c-d" class="form-control sol-input"></div>
                    <div class="col-md-2"><button class="btn btn-red w-100" onclick="addItem('customers')">Add</button></div>
                </div>
            </div>
            <div class="table-responsive sol-card p-0"><table class="table m-0"><thead><tr><th>Name</th><th>Society</th><th>Date</th><th>Action</th></tr></thead><tbody id="list-cust"></tbody></table></div>
        </div>

        <div class="tab-pane fade" id="tab-cal">
            <div class="sol-card p-0 overflow-auto">
                <div class="p-3 d-flex justify-content-between bg-dark align-items-center">
                    <button class="btn btn-sm btn-outline-light" onclick="changeMonth(-1)"><i class="bi bi-chevron-left"></i></button>
                    <h5 class="m-0 fw-bold text-uppercase" id="cal-month-label"></h5>
                    <button class="btn btn-sm btn-outline-light" onclick="changeMonth(1)"><i class="bi bi-chevron-right"></i></button>
                </div>
                <div class="cal-grid" id="calendar-body"></div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-inv">
            <div class="sol-card admin-only">
                <div class="row g-2">
                    <div class="col-md-7"><input type="text" id="i-n" class="form-control sol-input" placeholder="Item"></div>
                    <div class="col-md-3"><input type="number" id="i-q" class="form-control sol-input" placeholder="Qty"></div>
                    <div class="col-md-2"><button class="btn btn-red w-100" onclick="addItem('inventory')">Stock</button></div>
                </div>
            </div>
            <div class="table-responsive sol-card p-0"><table class="table m-0"><thead><tr><th>Item</th><th>Qty</th><th>Status</th><th>Action</th></tr></thead><tbody id="list-inv"></tbody></table></div>
        </div>

        <div class="tab-pane fade" id="tab-chk">
            <div class="sol-card admin-only"><div class="row g-2"><div class="col-10"><input type="text" id="tk-n" class="form-control sol-input" placeholder="New Task..."></div><div class="col-2"><button class="btn btn-red w-100" onclick="addItem('tasks')">Post</button></div></div></div>
            <div class="sol-card p-0" id="list-chk"></div>
        </div>

        <div class="tab-pane fade" id="tab-fin">
            <div class="sol-card admin-only"><div class="row g-2"><div class="col-md-7"><input type="text" id="f-d" class="form-control sol-input" placeholder="Description"></div><div class="col-md-3"><input type="number" id="f-a" class="form-control sol-input" placeholder="Amount"></div><div class="col-md-2"><button class="btn btn-red w-100" onclick="addItem('finance')">Log</button></div></div></div>
            <div class="table-responsive sol-card p-0"><table class="table m-0"><thead><tr><th>Desc</th><th>Amount</th><th>Action</th></tr></thead><tbody id="list-fin"></tbody></table><div class="p-3 bg-dark d-flex justify-content-between"><span>Total:</span><h4 id="fin-total" class="m-0 fw-bold text-danger"></h4></div></div>
        </div>

        <div class="tab-pane fade" id="tab-acc">
            <div class="sol-card"><div class="row g-2"><div class="col-md-4"><input type="text" id="nu-u" class="form-control sol-input" placeholder="User"></div><div class="col-md-4"><input type="text" id="nu-p" class="form-control sol-input" placeholder="Pass"></div><div class="col-md-2"><select id="nu-r" class="form-select sol-input"><option>Employee</option><option>Manager</option><option>Managing Partner</option></select></div><div class="col-md-2"><button class="btn btn-red w-100" onclick="addUser()">Create</button></div></div></div>
            <div class="sol-card border-info"><h6 class="text-info fw-bold text-uppercase mb-3">Calendar Cleanup</h6><div class="d-flex gap-2"><button class="btn btn-sm btn-outline-info" onclick="clearData('notes')">Clear Notes</button><button class="btn btn-sm btn-outline-danger" onclick="clearData('statusHistory')">Clear Milestones</button></div></div>
            <div class="table-responsive sol-card p-0 mt-4"><table class="table m-0"><thead><tr><th>User</th><th>Role</th><th>Status</th><th>Action</th></tr></thead><tbody id="list-acc"></tbody></table></div>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('solace_v46_8')) || {
        projects: [], customers: [], finance: [], notes: [], statusHistory: [], tasks: [], inventory: [],
        users: [{u: 'taksheel', p: 'tvsk2009@', role: 'Managing Partner'}]
    };
    let sessionUser = null; let currDate = new Date();

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

    function login() {
        const u = document.getElementById('u-in').value, p = document.getElementById('p-in').value;
        sessionUser = db.users.find(x => x.u === u && x.p === p);
        if(sessionUser) {
            document.getElementById('login-overlay').style.display='none';
            document.getElementById('sidebar').style.display='block';
            document.getElementById('main-panel').style.display='block';
            document.getElementById('top-ui').style.display='flex';
            document.getElementById('user-display').innerText = sessionUser.u;
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = (sessionUser.role === 'Managing Partner' ? 'block' : 'none'));
            render();
        } else alert("Denied.");
    }

    function showTab(id, el) {
        document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('show', 'active'));
        document.getElementById(id).classList.add('show', 'active');
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('tab-label').innerText = el.innerText.trim();
        if(window.innerWidth < 992) toggleSidebar();
    }

    function addItem(type) {
        if(type==='projects') {
            const id = Date.now();
            db.projects.push({id: id, n: document.getElementById('p-n').value, a: document.getElementById('p-a').value, s: document.getElementById('p-s').value, e: document.getElementById('p-e').value, status: 'Structure Done'});
            db.statusHistory.push({pid: id, name: document.getElementById('p-n').value, status: 'Structure Done', date: new Date().toISOString().split('T')[0]});
        }
        if(type==='customers') db.customers.push({id: Date.now(), n: document.getElementById('c-n').value, s: document.getElementById('c-s').value, d: document.getElementById('c-d').value});
        if(type==='inventory') db.inventory.push({id: Date.now(), n: document.getElementById('i-n').value, q: parseInt(document.getElementById('i-q').value)});
        if(type==='finance') db.finance.push({id: Date.now(), d: document.getElementById('f-d').value, a: parseFloat(document.getElementById('f-a').value)});
        if(type==='tasks') db.tasks.push({id: Date.now(), t: document.getElementById('tk-n').value, done: false});
        save();
    }

    function updateP(id, val) {
        let p = db.projects.find(x => x.id === id); p.status = val;
        db.statusHistory.push({pid: id, name: p.n, status: val, date: new Date().toISOString().split('T')[0]});
        save();
    }

    function addUser() {
        db.users.push({u: document.getElementById('nu-u').value, p: document.getElementById('nu-p').value, role: document.getElementById('nu-r').value});
        save();
    }

    function render() {
        const pStat = ["Structure Done", "Wiring Done", "Panels Installed", "Finished"];
        document.getElementById('list-pro').innerHTML = db.projects.map(x => `<tr><td>${x.n}</td><td>${x.a}</td><td><select onchange="updateP(${x.id}, this.value)" class="form-select form-select-sm sol-input">${pStat.map(s=>`<option ${x.status===s?'selected':''}>${s}</option>`).join('')}</select></td><td><i class="bi bi-trash text-danger pointer" onclick="del('projects',${x.id})"></i></td></tr>`).join('');
        document.getElementById('list-cust').innerHTML = db.customers.map(x => `<tr><td>${x.n}</td><td>${x.s}</td><td>${x.d}</td><td><i class="bi bi-trash text-danger pointer" onclick="del('customers',${x.id})"></i></td></tr>`).join('');
        document.getElementById('list-inv').innerHTML = db.inventory.map(x => `<tr><td>${x.n}</td><td><input type="number" value="${x.q}" class="sol-input form-control-sm w-50" onchange="db.inventory.find(i=>i.id===${x.id}).q=parseInt(this.value);save()"></td><td>${x.q<10?'<span class="badge bg-danger">LOW</span>':'<span class="badge bg-success">OK</span>'}</td><td><i class="bi bi-trash text-danger pointer" onclick="del('inventory',${x.id})"></i></td></tr>`).join('');
        document.getElementById('list-chk').innerHTML = db.tasks.map(x => `<div class="p-3 border-bottom border-dark d-flex justify-content-between"><div><input type="checkbox" ${x.done?'checked':''} onchange="db.tasks.find(t=>t.id===${x.id}).done=!${x.done};save()" class="me-3"><span class="${x.done?'text-decoration-line-through text-muted':''}">${x.t}</span></div><i class="bi bi-x-circle text-danger pointer" onclick="del('tasks',${x.id})"></i></div>`).join('');
        let total = 0;
        document.getElementById('list-fin').innerHTML = db.finance.map(x => { total+=x.a; return `<tr><td>${x.d}</td><td>₹${x.a}</td><td><i class="bi bi-trash text-danger pointer" onclick="del('finance',${x.id})"></i></td></tr>`}).join('');
        document.getElementById('fin-total').innerText = "₹" + total;
        document.getElementById('list-acc').innerHTML = db.users.map(u => `<tr><td>${u.u}</td><td>${u.role}</td><td>Active</td><td>${u.u!=='taksheel' ? `<i class="bi bi-trash text-danger pointer" onclick="db.users=db.users.filter(z=>z.u!=='${u.u}');save()"></i>`:''}</td></tr>`).join('');
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-body'); grid.innerHTML = '';
        const y = currDate.getFullYear(), m = currDate.getMonth();
        document.getElementById('cal-month-label').innerText = new Intl.DateTimeFormat('en-US', {month: 'long', year: 'numeric'}).format(currDate);
        for(let i=1; i<=new Date(y, m+1, 0).getDate(); i++) {
            const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            let h = `<div class="cal-day" onclick="addNote('${dStr}')"><span class="opacity-25">${i}</span>`;
            db.projects.filter(p=>p.s<=dStr && p.e>=dStr).forEach(p=>h+=`<div class="cal-event ev-proj">${p.n}</div>`);
            db.statusHistory.filter(s=>s.date===dStr).forEach(s=>h+=`<div class="cal-event ev-mile">${s.status}</div>`);
            db.notes.filter(n=>n.date===dStr).forEach(n=>h+=`<div class="cal-event ev-note">${n.text}</div>`);
            grid.innerHTML += h + `</div>`;
        }
    }

    function clearData(type) { if(confirm("Clear these entries?")) { db[type] = []; save(); renderCalendar(); } }
    function del(t, id) { db[t] = db[t].filter(x => x.id !== id); save(); }
    function save() { localStorage.setItem('solace_v46_8', JSON.stringify(db)); render(); }
    function changeMonth(v) { currDate.setMonth(currDate.getMonth()+v); renderCalendar(); }
    function addNote(d) { const m = prompt("Note:"); if(m) { db.notes.push({date: d, text: m}); save(); renderCalendar(); } }
</script>
</body>
</html>
